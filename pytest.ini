[pytest]
markers =
    performance: marks tests as performance related
    integration: marks tests as integration tests
    slow: marks tests as slow
    serial: marks tests that cannot run in parallel

# 测试发现选项
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 覆盖率选项
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: